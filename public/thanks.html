<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم تقديم طلبكم</title>
    <!-- استيراد خط عربي جميل -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            direction: rtl;
            overflow: hidden;
        }
        .message-box {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            position: relative;
            z-index: 1;
        }
        .message-box h1 {
            color: #4caf50;
            margin-bottom: 20px;
            font-family: 'Tajawal', sans-serif;
        }
        .message-box p {
            font-size: 18px;
            color: #333333;
        }
        .message-box .note {
            margin-top: 15px;
            font-size: 14px;
            color: #777777;
        }
        .buttons {
            margin-top: 25px;
        }
        .buttons button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 0 10px;
            transition: 0.3s;
        }
        .buttons button.yes {
            background-color: #4caf50;
            color: white;
        }
        .buttons button.yes:hover {
            background-color: #45a049;
        }
        .buttons button.no {
            background-color: #f44336;
            color: white;
        }
        .buttons button.no:hover {
            background-color: #da190b;
        }
        /* حاوية الفرقعة */
        #confetti {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="message-box">
        <h1>تم تقديم طلبكم بنجاح!</h1>
        <p>سيتم شحن طلبيتكم اليوم وستتوصلون بها في ضون يومين إلى ثلاثة أيام كحد أقصى.</p>
        <p class="note">شكراً لتسوقكم معنا!</p>

        <div class="buttons">
            <button class="yes" onclick="celebrate()">نعم، راضٍ</button>
            <button class="no" onclick="alert('نأسف لعدم رضاك، سنحاول التحسين.')">لا، غير راضٍ</button>
        </div>
        <canvas id="confetti"></canvas>
    </div>

    <script>
        // تأثير الفرقعة
        function celebrate() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const confettiCount = 150;
            const confetti = [];

            for (let i = 0; i < confettiCount; i++) {
                confetti.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 4,
                    d: Math.random() * confettiCount,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    tilt: Math.random() * 10 - 10,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.05,
                    tiltAngle: 0
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < confetti.length; i++) {
                    const c = confetti[i];
                    ctx.beginPath();
                    ctx.lineWidth = c.r;
                    ctx.strokeStyle = c.color;
                    ctx.moveTo(c.x + c.tilt + c.r / 2, c.y);
                    ctx.lineTo(c.x + c.tilt, c.y + c.tilt + c.r / 2);
                    ctx.stroke();
                }
                update();
            }

            function update() {
                for (let i = 0; i < confetti.length; i++) {
                    const c = confetti[i];
                    c.tiltAngle += c.tiltAngleIncremental;
                    c.y += (Math.cos(c.d) + 3 + c.r / 2) / 2;
                    c.x += Math.sin(c.d);
                    c.tilt = Math.sin(c.tiltAngle) * 12;

                    if (c.y > canvas.height) {
                        c.y = -10;
                        c.x = Math.random() * canvas.width;
                    }
                }
            }

            let animation = setInterval(draw, 20);
            setTimeout(() => clearInterval(animation), 5000); // الفرقعة لمدة 5 ثواني
        }
    </script>

</body>
</html>
