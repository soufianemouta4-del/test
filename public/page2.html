<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة الثانية</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #fff0f5;
        }
        h1 { color: #8e44ad; }
        button {
            margin: 20px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <h1>أهلاً بك في الصفحة الثانية</h1>
    <p>هذه هي الصفحة رقم 2</p>
    
    <button onclick="goToPage1()">العودة إلى الصفحة الأولى</button>

    <script>
        function goToPage1() {
            window.location.href = "/";
        }
    </script>
</body>
</html>
